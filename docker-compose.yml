
services:        # This section defines all the containers your project will run
  app:           # Name of the service (you can name it anything meaningful)
    build: .     # Build the Docker image from the Dockerfile in the current directory
    container_name: jvn-project-1 # Assign a human-readable name to the container
    ports:
      - "3010:3010"   # Map ports: hostPort:containerPort
                      # Host (your PC) port 3010 → Container port 3010
    restart: unless-stopped  # Restart container automatically if it crashes, but not if you manually stop it
    volumes:
      - .:/app       # Optional: Mount current project folder into /app in container
                      # Good for development: changes you make locally are reflected inside the container
    environment:
      NODE_ENV: production  # Set environment variables inside the container